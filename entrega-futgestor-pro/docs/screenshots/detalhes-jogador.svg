<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-label="Tela de detalhes do jogador">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="390" height="844" rx="28" fill="#f1f5f9"/>
  <rect x="0" y="0" width="390" height="214" rx="28" fill="#16a34a"/>
  <rect x="0" y="178" width="390" height="64" fill="#16a34a"/>
  <text x="24" y="62" fill="#ffffff" font-family="Arial, sans-serif" font-size="15" font-weight="700">&lt; Voltar</text>
  <circle cx="195" cy="116" r="46" fill="#dcfce7"/>
  <text x="195" y="131" text-anchor="middle" fill="#166534" font-family="Arial, sans-serif" font-size="34" font-weight="700">LA</text>
  <text x="195" y="184" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="25" font-weight="700">Lucas Andrade</text>
  <text x="195" y="210" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="15">Atacante</text>

  <g filter="url(#shadow)">
    <rect x="22" y="264" width="346" height="144" rx="14" fill="#ffffff"/>
    <text x="42" y="298" fill="#0f172a" font-family="Arial, sans-serif" font-size="18" font-weight="700">Informacoes do Atleta</text>
    <text x="42" y="331" fill="#64748b" font-family="Arial, sans-serif" font-size="14">Idade</text>
    <text x="160" y="331" fill="#0f172a" font-family="Arial, sans-serif" font-size="14" font-weight="700">24 anos</text>
    <text x="42" y="360" fill="#64748b" font-family="Arial, sans-serif" font-size="14">Altura</text>
    <text x="160" y="360" fill="#0f172a" font-family="Arial, sans-serif" font-size="14" font-weight="700">1.82m</text>
    <text x="42" y="389" fill="#64748b" font-family="Arial, sans-serif" font-size="14">Pe preferido</text>
    <text x="160" y="389" fill="#0f172a" font-family="Arial, sans-serif" font-size="14" font-weight="700">Direito</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="22" y="428" width="346" height="128" rx="14" fill="#ffffff"/>
    <text x="42" y="462" fill="#0f172a" font-family="Arial, sans-serif" font-size="18" font-weight="700">Resumo da Temporada</text>
    <rect x="42" y="486" width="88" height="48" rx="10" fill="#ecfdf5"/>
    <text x="86" y="507" text-anchor="middle" fill="#166534" font-family="Arial, sans-serif" font-size="18" font-weight="700">12</text>
    <text x="86" y="525" text-anchor="middle" fill="#166534" font-family="Arial, sans-serif" font-size="12">Gols</text>
    <rect x="151" y="486" width="88" height="48" rx="10" fill="#eff6ff"/>
    <text x="195" y="507" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="18" font-weight="700">22</text>
    <text x="195" y="525" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="12">Jogos</text>
    <rect x="260" y="486" width="88" height="48" rx="10" fill="#fefce8"/>
    <text x="304" y="507" text-anchor="middle" fill="#a16207" font-family="Arial, sans-serif" font-size="18" font-weight="700">5</text>
    <text x="304" y="525" text-anchor="middle" fill="#a16207" font-family="Arial, sans-serif" font-size="12">Assist.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="22" y="576" width="346" height="166" rx="14" fill="#ffffff"/>
    <text x="42" y="610" fill="#0f172a" font-family="Arial, sans-serif" font-size="18" font-weight="700">Historico</text>
    <text x="42" y="642" fill="#64748b" font-family="Arial, sans-serif" font-size="14">Clube anterior</text>
    <text x="42" y="669" fill="#0f172a" font-family="Arial, sans-serif" font-size="15" font-weight="700">Atletico Nacional FC</text>
    <text x="42" y="704" fill="#475569" font-family="Arial, sans-serif" font-size="14">Atacante veloz, bom no um contra um</text>
    <text x="42" y="727" fill="#475569" font-family="Arial, sans-serif" font-size="14">e referencia nas finalizacoes da equipe.</text>
  </g>

  <rect x="22" y="768" width="346" height="52" rx="13" fill="#16a34a"/>
  <text x="195" y="801" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">Voltar para o elenco</text>
</svg>
